# Heroku Profile Configuration
spring.application.name=uni.verse
spring.jpa.database=postgresql

# Production JPA settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# Heroku provides DATABASE_URL in format: postgres://user:password@host:port/database
# Spring Boot will auto-configure from DATABASE_URL if present
spring.datasource.url=${DATABASE_URL:}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JWT
jwt.secret.key=${JWT_SECRET_KEY}
jwt.access-key.expiration=${JWT_ACCESS_KEY_EXPIRATION:3600000}
jwt.refresh-key.expiration=${JWT_REFRESH_KEY_EXPIRATION:86400000}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_ID}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis - Heroku auto-sets REDIS_URL in format: rediss://h:password@host:port
# Explicitly configure Redis to use REDIS_URL
spring.data.redis.url=${REDIS_URL}
spring.cache.type=redis
spring.data.redis.connect-timeout=2000ms
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=true

# Rate limiting
requests.per.minute=${REQUESTS_PER_MINUTE:100}

# Superadmin
platform.superadmin.count=${SUPERADMIN_COUNT:1}

# Cloudflare R2 / S3
cloud.aws.credentials.s3.access-key=${S3_ACCESS_KEY}
cloud.aws.credentials.s3.secret-key=${S3_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION:auto}
cloud.aws.s3.enpoint=${S3_ENDPOINT}
cloud.aws.s3.private_bucket.name=${S3_PRIVATE_BUCKET}

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# JVM and Application Optimizations for Heroku
# Tomcat thread pool optimization
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=200
server.tomcat.accept-count=100

# Connection pool optimization (already set above, but ensuring consistency)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Logging optimization (reduce overhead)
logging.level.root=WARN
logging.level.com.omkar.uni.verse=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Additional memory optimizations
spring.jpa.open-in-view=false
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
